services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app          # hot reload
      - ./app/data:/app/data
    env_file:
      - .env
    environment:
      - DEBUG=true
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./app/frontend/src:/app/src  # hot reload
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
